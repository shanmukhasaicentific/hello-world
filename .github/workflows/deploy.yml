name: Deploy to Azure VM

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install        # ✅ changed from npm ci

      - name: Run tests
        run: npm test || true

      - name: Deploy application
        run: |
          pm2 restart hello-world || pm2 start index.js --name hello-world
          pm2 save

      - name: Verify deployment
        run: pm2 list
