name: Deploy Java Tomcat App to Azure VM

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Verify we are in right directory
      - name: Verify environment
        run: |
          echo "==== Working Directory ===="
          pwd
          echo "==== Files Present ===="
          ls -la
          echo "==== pom.xml exists? ===="
          cat pom.xml | grep artifactId | head -3

      # Step 3: Build WAR with Maven
      # Must run from directory containing pom.xml
      - name: Build WAR with Maven
        run: |
          mvn clean package -DskipTests
          echo "==== Build complete ===="
          
          # Confirm WAR was created
          echo "==== WAR file location ===="
          find . -name "*.war" -type f

      # Step 4: Copy WAR to root for Docker
      # Dockerfile does COPY ./*.war
      # So WAR must be in same folder as Dockerfile
      - name: Prepare WAR for Docker
        run: |
          # Copy the webapp.war to root directory
          cp webapp/target/webapp.war ./webapp.war
          
          echo "==== WAR ready for Docker ===="
          ls -lh *.war

      # Step 5: Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t hello-world-tomcat:latest .
          echo "==== Image built ===="
          docker images | grep hello-world-tomcat

      # Step 6: Stop old, start new container
      - name: Deploy Container
        run: |
          echo "==== Removing old container ===="
          docker stop hello-world-app || true
          docker rm hello-world-app || true

          echo "==== Starting new container ===="
          docker run -d \
            --name hello-world-app \
            --restart always \
            -p 8080:8080 \
            hello-world-tomcat:latest

          echo "==== Deployment done ===="
          docker ps

      # Step 7: Wait and verify
      - name: Verify Deployment
        run: |
          echo "==== Waiting 15s for Tomcat to start ===="
          sleep 15
          
          echo "==== Container status ===="
          docker ps | grep hello-world-app
          
          echo "==== Tomcat logs ===="
          docker logs hello-world-app --tail 20
          
          echo "==== Testing app ===="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            http://localhost:8080 || echo "Still starting..."
